<!-- Newsletter Section -->
<section class="py-16 bg-gradient-to-r from-amber-600 to-orange-600">
    <div class="container mx-auto px-6">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-4" data-th="รับข่าวสารและโปรโมชั่น" data-en="Subscribe for News & Promotions">
                รับข่าวสารและโปรโมชั่น
            </h2>
            <p class="text-amber-100 mb-8" data-th="ติดตามข้อมูลท่องเที่ยว กิจกรรม และโปรโมชั่นพิเศษจากเรา" data-en="Stay updated with travel info, activities, and special promotions">
                ติดตามข้อมูลท่องเที่ยว กิจกรรม และโปรโมชั่นพิเศษจากเรา
            </p>
            <form onsubmit="subscribeNewsletter(event)" class="flex flex-col md:flex-row gap-3 max-w-xl mx-auto">
                <input 
                    type="email" 
                    required
                    placeholder="กรอกอีเมลของคุณ / Enter your email"
                    class="flex-1 px-6 py-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-white">
                <button 
                    type="submit"
                    class="px-8 py-4 bg-white text-amber-600 font-bold rounded-lg hover:bg-amber-50 transition">
                    <span data-th="สมัครรับข่าวสาร" data-en="Subscribe">สมัครรับข่าวสาร</span>
                </button>
            </form>
        </div>
    </div>
</section>
